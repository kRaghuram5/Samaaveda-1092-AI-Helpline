<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Samaaveda | 1092 Helpline</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, rgba(112, 0, 255, 0.15) 0%, transparent 60%);
            margin: 0;
            overflow: hidden;
            font-family: var(--font-main);
            color: var(--text-main);
        }
        
        .landing-container {
            text-align: center;
            background: var(--glass-bg);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            max-width: 600px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .icon-container {
            font-size: 5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-start {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .btn-start:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.5);
        }

        .pulse-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent-secondary);
            animation: expand 3s infinite;
            opacity: 0;
            z-index: -1;
        }

        @keyframes expand {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="pulse-ring" style="top: 10%; left: 10%;"></div>
        <div class="pulse-ring" style="bottom: 10%; right: 10%; animation-delay: 1.5s;"></div>
        
        <div class="icon-container">
            <i class="fas fa-headset"></i>
        </div>
        <h1>Samaaveda</h1>
        <p>Welcome to the AI 1092 Helpline.<br>Intelligent triage, instant extraction, and rapid emergency routing.</p>
        
        <a href="/main" class="btn-start">
            <i class="fas fa-phone-alt"></i> TAKE CALL
        </a>
    </div>

</body>
</html>
