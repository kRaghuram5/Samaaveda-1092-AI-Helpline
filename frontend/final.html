<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Completed | Samaaveda 1092</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1) 0%, transparent 60%);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-main);
        }
        
        .final-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-section h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin: 10px 0;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge.escalated {
            background: rgba(255, 65, 108, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .status-badge.submitted {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .data-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .data-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .data-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
        }

        .btn-next {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 16px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="final-container">
        <div class="header-section">
            <div id="badge" class="status-badge">Processing...</div>
            <h1>Call Completed</h1>
            <p style="color: var(--text-dim);">The structured report has been securely saved to the command center.</p>
        </div>

        <div class="details-grid">
            <div class="data-card">
                <div class="data-label"><i class="fas fa-tag"></i> Intent</div>
                <div class="data-value" id="res-intent">--</div>
            </div>
            <div class="data-card">
                <div class="data-label"><i class="fas fa-exclamation-circle"></i> Issue Type</div>
                <div class="data-value" id="res-issue">--</div>
            </div>
            <div class="data-card">
                <div class="data-label"><i class="fas fa-map-marker-alt"></i> Location</div>
                <div class="data-value" id="res-location">--</div>
            </div>
            <div class="data-card">
                <div class="data-label"><i class="fas fa-clock"></i> Duration</div>
                <div class="data-value" id="res-duration">--</div>
            </div>
            
            <div class="data-card" style="grid-column: span 2; display: flex; justify-content: space-between; align-items: center; background: rgba(112,0,255,0.1); border-color: rgba(112,0,255,0.3);">
                <div>
                    <div class="data-label">Urgency</div>
                    <div class="data-value" id="res-urgency" style="color: var(--danger);">--</div>
                </div>
                <div>
                    <div class="data-label">Confidence</div>
                    <div class="data-value" id="res-confidence" style="color: var(--success);">--</div>
                </div>
                <div>
                    <div class="data-label">Emotion</div>
                    <div class="data-value" id="res-sentiment" style="color: var(--accent-secondary);">--</div>
                </div>
            </div>
        </div>

        <a href="/main" class="btn-next">
            <i class="fas fa-phone-alt"></i> TAKE ANOTHER CALL
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('final_case_data');
            if (dataStr) {
                try {
                    const data = JSON.parse(dataStr);
                    
                    document.getElementById('res-intent').innerText = data.intent || '--';
                    document.getElementById('res-issue').innerText = data.issueType || '--';
                    document.getElementById('res-location').innerText = data.location || '--';
                    document.getElementById('res-duration').innerText = data.duration || '--';
                    document.getElementById('res-urgency').innerText = data.urgency || '--';
                    document.getElementById('res-confidence').innerText = data.confidence || '--';
                    document.getElementById('res-sentiment').innerText = data.sentiment || '--';

                    const badge = document.getElementById('badge');
                    if (data.state === 'ESCALATED') {
                        badge.innerText = '🚨 ESCALATED TO DISPATCH';
                        badge.className = 'status-badge escalated';
                    } else {
                        badge.innerText = '✓ SUCCESSFULLY SUBMITTED';
                        badge.className = 'status-badge submitted';
                    }
                    
                } catch(e) {
                    console.error("Error parsing case data", e);
                }
            }
        });
    </script>
</body>
</html>
